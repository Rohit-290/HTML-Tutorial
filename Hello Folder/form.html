<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <header>
             <h3><pre>                                                                            Student Registration Form                                                             </pre></h3>
    </header>
    <br><br>
                 <main>
                          
                         <form action="/action.php">
                             <section>

                                    <label for="Username"><b>Username</b></label>
                                        <input type="username" placeholder="Enter your username" id="Username">
                                    </label>    
                                    <br><br>
                                    <label for="Password"><b>Password</b></label>
                                        <input type="password"  placeholder="Enter your password" id="Password">    
                                    </label>

                            </section>
                                    <br><br>
                            <section>

                                    <label for="101">
                                        <input type="radio" value="class XI" name="Class" id="101">Class XI
                                    </label>
                                    <label for="102">
                                        <input type="radio" value="class XII" name="Class" id="102">Class XII
                                    </label>  

                            </section> 
                            <section> 

                                    <br><br><h4><b>Please select your Subjects</b></h4>
                                    <label for="Sub1">
                                        <input type="checkbox" value="Maths" name="subject" id="Sub1">Maths
                                    </label>
                                    <br>
                                    <label for="Sub2">
                                        <input type="checkbox" value="Physics" name="subject" id="Sub2">Physics
                                    </label>
                                    <br>
                                    <label for="Sub3">
                                        <input type="checkbox" value="Chemistry" name="subject" id="Sub3">Chemistry
                                    </label>
                                    <br>
                                    <label for="Sub4">
                                        <input type="checkbox" value="Computer Science" name="subject" id="Sub4">Computer Science
                                    </label>
                                    <br>
                                    <label for="Sub5">
                                        <input type="checkbox" value="Biology" name="subject" id="Sub5">Biology

                            </section> 
                        
                                    <br><br>
                                    <textarea name="Feedback" id="Feedback" placeholder="Please add Feedback" rows=5 ></textarea>

                            <section> 

                                    <br><br><h4><b>Please select your City</b></h4>
                                    <select name="city" id="city">
                                        <option value="Mumbai">Mumbai</option>
                                        <option value="Delhi">Delhi</option>
                                        <option value="Hyderabad">Hyderabad</option>
                                        <option value="Chennai">Chennai</option>
                                        <option value="Kochi">Kochi</option>
                                    </select>

                            </section> 
                                    <br><br>
                            <section> 
                                
                                    <iframe width="279" height="240" src="https://www.youtube.com/embed/4GazM-dI1do?list=PLImps_mlpW359BrOz2ySa4G20-bhIWaeK" title="HTML Coding 101: 01 Introduction to HTML - Master the Basics with W3Schools HTML Tutorial" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                                    
                            </section>        
                             </form>
                           
                 </main>
    <footer>

    </footer>
</body>
</html>
